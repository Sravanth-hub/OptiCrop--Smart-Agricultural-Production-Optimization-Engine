<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Find Your Crop</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>


<body class="predict-body">


<!-- Navigation Bar -->

<div class="navbar">

    <a href="{{ url_for('home') }}">Home</a>

    <a href="{{ url_for('about') }}">About</a>

    <a href="{{ url_for('findyourcrop') }}">Find Your Crop</a>

</div>



<!-- Prediction Form -->

<div class="predict-container">


    <h2>
        🌱 Crop Prediction
    </h2>


    <form action="{{ url_for('predict') }}" method="POST">


        <label>Nitrogen (N)</label>

        <input type="number" 
               name="nitrogen" 
               placeholder="Enter Nitrogen value"
               required>



        <label>Phosphorous (P)</label>

        <input type="number" 
               name="phosphorous" 
               placeholder="Enter Phosphorous value"
               required>



        <label>Potassium (K)</label>

        <input type="number" 
               name="potassium" 
               placeholder="Enter Potassium value"
               required>



        <label>Temperature</label>

        <input type="number"
               step="0.01"
               name="temperature"
               placeholder="Enter Temperature"
               required>



        <label>Humidity</label>

        <input type="number"
               step="0.01"
               name="humidity"
               placeholder="Enter Humidity"
               required>



        <label>pH Value</label>

        <input type="number"
               step="0.01"
               name="ph"
               placeholder="Enter Soil pH"
               required>



        <label>Rainfall</label>

        <input type="number"
               step="0.01"
               name="rainfall"
               placeholder="Enter Rainfall"
               required>



        <button type="submit">
            Predict Crop
        </button>


    </form>



    {% if prediction %}

    <div class="result">

        🌾 Recommended Crop:

        <br><br>

        {{ prediction }}

    </div>

    {% endif %}



</div>


</body>

</html>
